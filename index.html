<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Little District</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="book">

        <div id="pages">

            <!-- ==========================================
                 COVER
            =========================================== -->

            <section id="page-cover" class="page">

                <div class="page-content">

                    <div class="cover-content">

                        <p class="publisher">
                            The Little District
                        </p>

                        <h1 class="book-title">
                            Pocket Folk
                        </h1>

                        <p class="volume">
                            Volume One
                        </p>

                        <img
                            id="cover-character"
                            alt="Pocket Folk">

                        <h2 id="cover-name"></h2>

                        <p class="cover-tagline">
                            A tiny companion for thoughtful days.
                        </p>

                    </div>

                </div>

            </section>



            <!-- ==========================================
                 PAGE 1 - MEET
            =========================================== -->

            <section id="page-meet" class="page">

                <div class="page-content">

                    <img
                        id="character-image"
                        alt="Pocket Folk">

                    <h1 id="name"></h1>

                    <p id="introduction"></p>

                </div>

            </section>



            <!-- ==========================================
                 PAGE 2 - THOUGHT
            =========================================== -->

            <section id="page-thought" class="page">

                <div class="page-content">

                    <p
                        id="whisper"
                        class="thought">
                    </p>

                </div>

            </section>



            <!-- ==========================================
                 PAGE 3 - REFLECTION
            =========================================== -->

            <section id="page-reflection" class="page">

                <div class="page-content">

                    <p
                        id="journal-prompt"
                        class="reflection">
                    </p>

                </div>

            </section>



            <!-- ==========================================
                 BACK COVER
            =========================================== -->

            <section id="page-back-cover" class="page">

                <div class="page-content">

                    <p id="farewell"></p>

                </div>

            </section>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
