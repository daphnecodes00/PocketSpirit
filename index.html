<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Little District</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="book">

    <div id="pages">

        <!-- ==========================================
             COVER
        =========================================== -->

        <section id="page-cover" class="page">

            <div class="cover-content">

                <p class="publisher">
                    The Little District
                </p>

                <h1 class="book-title">
                    Pocket Folk
                </h1>

                <p class="volume">
                    Volume One
                </p>

                <img
                    id="cover-character"
                    alt="Pocket Folk">

                <h2 id="cover-name"></h2>

                <p class="cover-tagline">
                    A tiny companion for thoughtful days.
                </p>

            </div>

        </section>



        <!-- ==========================================
             PAGE 1
        =========================================== -->

        <section id="page-meet" class="page">

            <img
                id="character-image"
                alt="Pocket Folk">

            <h1 id="name"></h1>

            <p id="introduction"></p>

        </section>



        <!-- ==========================================
             PAGE 2
        =========================================== -->

        <section id="page-thought" class="page">

            <p id="whisper" class="thought"></p>

        </section>



        <!-- ==========================================
             PAGE 3
        =========================================== -->

        <section id="page-reflection" class="page">

            <p id="journal-prompt" class="reflection"></p>

        </section>



        <!-- ==========================================
             BACK COVER
        =========================================== -->

        <section id="page-back-cover" class="page">

            <p id="farewell"></p>

        </section>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
