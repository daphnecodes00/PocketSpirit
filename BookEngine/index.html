<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Pocket Spirit Book Engine</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main id="book">

        <!-- ======================================
             SHEET B (BOTTOM)
        ======================================= -->

        <section
            id="sheet-b"
            class="sheet">

            <div class="page front">

                <div class="page-content" id="text-b"></div>

            </div>

            <div class="page back">

                <div class="page-back"></div>

            </div>

        </section>

        <!-- ======================================
             SHEET A (TOP)
        ======================================= -->

        <section
            id="sheet-a"
            class="sheet">

            <div class="page front">

                <div class="page-content" id="text-a"></div>

            </div>

            <div class="page back">

                <div class="page-back"></div>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
