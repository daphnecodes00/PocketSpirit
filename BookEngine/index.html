<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Book Engine</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <main id="book">

        <!-- ==========================================
             SHEET B (BOTTOM)
        =========================================== -->

        <section
            id="sheet-b"
            class="sheet">

            <!-- FRONT -->

            <div class="page front">

                <h1 id="text-b">
                    PAGE 1
                </h1>

            </div>

            <!-- BACK -->

            <div class="page back">

                <div class="page-back"></div>

            </div>

        </section>

        <!-- ==========================================
             SHEET A (TOP)
        =========================================== -->

        <section
            id="sheet-a"
            class="sheet">

            <!-- FRONT -->

            <div class="page front">

                <h1 id="text-a">
                    TEST ENGINE
                </h1>

            </div>

            <!-- BACK -->

            <div class="page back">

                <div class="page-back"></div>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
